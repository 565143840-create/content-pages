<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>内容发布助手</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 500px;
            margin: 0 auto;
            background: white;
            border-radius: 16px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            overflow: hidden;
        }
        
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px 20px;
            text-align: center;
        }
        
        .header h1 {
            font-size: 24px;
            margin-bottom: 10px;
        }
        
        .header p {
            font-size: 14px;
            opacity: 0.9;
        }
        
        .content {
            padding: 30px 20px;
        }
        
        .section {
            margin-bottom: 25px;
        }
        
        .section-title {
            font-size: 16px;
            font-weight: 600;
            color: #333;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
        }
        
        .section-title::before {
            content: '';
            width: 4px;
            height: 16px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            margin-right: 10px;
            border-radius: 2px;
        }
        
        .title-box {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 15px;
            font-size: 16px;
            line-height: 1.6;
            color: #333;
            word-break: break-all;
        }
        
        .tags-box {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 15px;
            font-size: 14px;
            color: #666;
            line-height: 1.8;
        }
        
        .tag {
            display: inline-block;
            background: #e8f0fe;
            color: #1a73e8;
            padding: 4px 12px;
            border-radius: 20px;
            margin: 4px;
            font-size: 13px;
        }
        
        .btn-group {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }
        
        .btn {
            flex: 1;
            padding: 12px 20px;
            border: none;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }
        
        .btn-secondary {
            background: #f0f0f0;
            color: #333;
        }
        
        .btn-secondary:hover {
            background: #e0e0e0;
        }
        
        .download-section {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            margin-top: 20px;
        }
        
        .download-section a {
            display: inline-block;
            background: white;
            color: #667eea;
            padding: 14px 30px;
            border-radius: 10px;
            text-decoration: none;
            font-weight: 600;
            font-size: 16px;
            transition: all 0.3s ease;
        }
        
        .download-section a:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
        
        .footer {
            text-align: center;
            padding: 20px;
            font-size: 12px;
            color: #999;
            border-top: 1px solid #f0f0f0;
        }
        
        .toast {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.8);
            color: white;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 14px;
            opacity: 0;
            transition: opacity 0.3s ease;
            z-index: 1000;
        }
        
        .toast.show {
            opacity: 1;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📱 内容发布助手</h1>
            <p>抖音内容方案</p>
        </div>
        
        <div class="content">
            <div class="section">
                <div class="section-title">标题</div>
                <div class="title-box" id="titleText">"丁香花结了又结 人生焦虑的课题换了又换"</div>
                <div class="btn-group">
                    <button class="btn btn-primary" onclick="copyText('titleText')">📋 复制标题</button>
                </div>
            </div>
            
            <div class="section">
                <div class="section-title">发布内容（含标签）</div>
                <div class="tags-box" id="contentText">"丁香花结了又结 人生焦虑的课题换了又换"</div>
                <div class="btn-group">
                    <button class="btn btn-primary" onclick="copyText('contentText')">📋 复制内容</button>
                </div>
            </div>
            
            <div class="download-section">
                <a href="" download>⬇️ 下载素材</a>
            </div>
            
            <div style="margin-top: 15px; text-align: center;">
                <a href="http://content-copaw-agent-2026.oss-cn-beijing.aliyuncs.com/pages/douyin_20260408_010315.html" target="_blank" style="color: #667eea; font-size: 14px;">🔗 在新窗口打开此页面</a>
            </div>
        </div>
        
        <div class="footer">
            内容运营助手 · 生成时间 2026-04-08 01:03
        </div>
    </div>
    
    <div class="toast" id="toast">复制成功！</div>
    
    <script>
        function copyText(elementId) {
            const element = document.getElementById(elementId);
            const text = element.innerText;
            
            if (navigator.clipboard) {
                navigator.clipboard.writeText(text).then(() => {
                    showToast('复制成功！');
                });
            } else {
                // 兼容旧浏览器
                const textarea = document.createElement('textarea');
                textarea.value = text;
                document.body.appendChild(textarea);
                textarea.select();
                document.execCommand('copy');
                document.body.removeChild(textarea);
                showToast('复制成功！');
            }
        }
        
        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.add('show');
            
            setTimeout(() => {
                toast.classList.remove('show');
            }, 2000);
        }
    </script>
</body>
</html>
