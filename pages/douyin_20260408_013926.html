<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>内容发布助手</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 500px;
            margin: 0 auto;
            background: white;
            border-radius: 16px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            overflow: hidden;
        }
        
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px 20px;
            text-align: center;
        }
        
        .header h1 {
            font-size: 24px;
            margin-bottom: 10px;
        }
        
        .header p {
            font-size: 14px;
            opacity: 0.9;
        }
        
        .content {
            padding: 30px 20px;
        }
        
        .section {
            margin-bottom: 25px;
        }
        
        .section-title {
            font-size: 16px;
            font-weight: 600;
            color: #333;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
        }
        
        .section-title::before {
            content: '';
            width: 4px;
            height: 16px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            margin-right: 10px;
            border-radius: 2px;
        }
        
        .title-box {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 15px;
            font-size: 16px;
            line-height: 1.6;
            color: #333;
            word-break: break-all;
        }
        
        .tags-box {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 15px;
            font-size: 14px;
            color: #666;
            line-height: 1.8;
        }
        
        .btn-group {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }
        
        .btn {
            flex: 1;
            padding: 12px 20px;
            border: none;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }
        
        .btn-secondary {
            background: #f0f0f0;
            color: #333;
        }
        
        .btn-secondary:hover {
            background: #e0e0e0;
        }
        
        /* 素材预览区域 */
        .material-section {
            margin-top: 20px;
        }
        
        .material-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 15px;
        }
        
        .material-item {
            position: relative;
            aspect-ratio: 1;
            border-radius: 8px;
            overflow: hidden;
            background: #f0f0f0;
        }
        
        .material-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .material-item a {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(0,0,0,0.3);
            color: white;
            text-decoration: none;
            opacity: 0;
            transition: opacity 0.3s;
        }
        
        .material-item:hover a {
            opacity: 1;
        }
        
        .download-all {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 12px;
            padding: 15px;
            text-align: center;
            margin-top: 10px;
        }
        
        .download-all-btn {
            display: inline-block;
            background: white;
            color: #667eea;
            padding: 12px 24px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 600;
            font-size: 15px;
            border: none;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .download-all-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
        
        .single-material {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            margin-top: 10px;
        }
        
        .single-material a {
            display: inline-block;
            background: white;
            color: #667eea;
            padding: 14px 30px;
            border-radius: 10px;
            text-decoration: none;
            font-weight: 600;
            font-size: 16px;
            transition: all 0.3s ease;
        }
        
        .single-material a:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
        
        .footer {
            text-align: center;
            padding: 20px;
            font-size: 12px;
            color: #999;
            border-top: 1px solid #f0f0f0;
        }
        
        .toast {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.8);
            color: white;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 14px;
            opacity: 0;
            transition: opacity 0.3s ease;
            z-index: 1000;
        }
        
        .toast.show {
            opacity: 1;
        }
        
        .material-count {
            font-size: 13px;
            color: #999;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📱 内容发布助手</h1>
            <p>抖音内容方案</p>
        </div>
        
        <div class="content">
            <div class="section">
                <div class="section-title">标题</div>
                <div class="title-box" id="titleText">今日份好物分享</div>
                <div class="btn-group">
                    <button class="btn btn-primary" onclick="copyText('titleText')">📋 复制标题</button>
                </div>
            </div>
            
            <div class="section">
                <div class="section-title">发布内容（含标签）</div>
                <div class="tags-box" id="contentText">今日份好物分享<br>#好物 #种草 #图文</div>
                <div class="btn-group">
                    <button class="btn btn-primary" onclick="copyText('contentText')">📋 复制内容</button>
                </div>
            </div>
            
            <div class="material-section">
                <div class="section-title">素材下载</div>
                <div id="materialArea"></div>
            </div>
            
            <div style="margin-top: 15px; text-align: center;">
                <a href="http://content-copaw-agent-2026.oss-cn-beijing.aliyuncs.com/pages/douyin_20260408_013926.html" target="_blank" style="color: #667eea; font-size: 14px;">🔗 在新窗口打开此页面</a>
            </div>
        </div>
        
        <div class="footer">
            内容运营助手 · 生成时间 2026-04-08 01:39
        </div>
    </div>
    
    <div class="toast" id="toast">复制成功！</div>
    
    <script>
        // 素材URL列表（由后端注入）
        const materialUrls = ["https://rh-images-1252422369.cos.ap-beijing.myqcloud.com/c6991c26cdfac605acc5853e70f3db12/output/ComfyUI_00001_xmmqk_1774494662.png", "https://rh-images-1252422369.cos.ap-beijing.myqcloud.com/c6991c26cdfac605acc5853e70f3db12/output/qwen-edit-aijuxi_00002_sefxt_1774494296.png"];
        
        // 渲染素材区域
        function renderMaterials() {
            const area = document.getElementById('materialArea');
            
            if (!materialUrls || materialUrls.length === 0) {
                area.innerHTML = '<p style="color: #999; text-align: center;">暂无素材</p>';
                return;
            }
            
            if (materialUrls.length === 1) {
                // 单张图片
                area.innerHTML = `
                    <div class="single-material">
                        <a href="${materialUrls[0]}" download>⬇️ 下载素材</a>
                    </div>
                `;
            } else {
                // 多张图片（组图）
                let html = `<p class="material-count">共 ${materialUrls.length} 张图片</p>`;
                html += '<div class="material-grid">';
                
                materialUrls.forEach((url, index) => {
                    html += `
                        <div class="material-item">
                            <img src="${url}" alt="素材${index + 1}" loading="lazy">
                            <a href="${url}" download>下载</a>
                        </div>
                    `;
                });
                
                html += '</div>';
                html += `
                    <div class="download-all">
                        <button class="download-all-btn" onclick="downloadAll()">⬇️ 下载全部 (${materialUrls.length}张)</button>
                    </div>
                `;
                
                area.innerHTML = html;
            }
        }
        
        // 下载全部素材
        function downloadAll() {
            showToast('开始下载，请稍候...');
            
            materialUrls.forEach((url, index) => {
                setTimeout(() => {
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = `素材_${index + 1}.jpg`;
                    a.target = '_blank';
                    document.body.appendChild(a);
                    a.click();
                    document.body.removeChild(a);
                }, index * 500); // 每张间隔500ms，避免浏览器阻止
            });
        }
        
        // 复制文本
        function copyText(elementId) {
            const element = document.getElementById(elementId);
            const text = element.innerText;
            
            if (navigator.clipboard) {
                navigator.clipboard.writeText(text).then(() => {
                    showToast('复制成功！');
                });
            } else {
                const textarea = document.createElement('textarea');
                textarea.value = text;
                document.body.appendChild(textarea);
                textarea.select();
                document.execCommand('copy');
                document.body.removeChild(textarea);
                showToast('复制成功！');
            }
        }
        
        // 显示提示
        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.add('show');
            
            setTimeout(() => {
                toast.classList.remove('show');
            }, 2000);
        }
        
        // 页面加载时渲染素材
        document.addEventListener('DOMContentLoaded', renderMaterials);
    </script>
</body>
</html>
